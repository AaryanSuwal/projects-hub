<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aaryan's Project Hub</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <nav>
      <div class="container inner">
        <div class="logo">~/aaryan<span>/projects</span></div>
        <ul class="nav-links">
          <li>
            <a href="https://www.aaryansuwal.com.np" target="_blank"
              >portfolio</a
            >
          </li>
          <li>
            <a href="https://github.com/AaryanSuwal" target="_blank">github</a>
          </li>
        </ul>
      </div>
    </nav>
    <div class="container">
      <section class="hero">
        <div class="hero-label">project hub</div>
        <h1>
          Things I<br /><span class="dim">actually</span>
          <span class="accent">built.</span>
        </h1>
        <p>
          // A curated collection of tools, apps & experiments. Click any card
          to launch.
        </p>
        <div class="hero-stats">
          <div class="stat">
            <span class="stat-num" id="total-count">—</span
            ><span class="stat-label">projects</span>
          </div>
          <div class="stat">
            <span class="stat-num" id="live-count">—</span
            ><span class="stat-label">live</span>
          </div>
          <div class="stat">
            <span class="stat-num">2025</span
            ><span class="stat-label">since</span>
          </div>
        </div>
      </section>
      <div class="filters-row">
        <div class="search-wrap">
          <span class="search-icon">/&gt;</span>
          <input type="text" id="search" placeholder="search projects..." />
        </div>
        <div class="filter-btns" id="filter-btns">
          <button class="filter-btn active" data-filter="all">All</button>
        </div>
      </div>
      <section class="projects-section">
        <div class="section-header">
          <span class="section-title">// projects</span>
          <span id="project-count"></span>
        </div>
        <div class="grid" id="grid">
          <div class="state-msg" id="loading">
            <div class="loader"></div>
            <p>// fetching projects...</p>
          </div>
        </div>
      </section>
    </div>
    <footer>
      <div class="container">
        <p>
          built by <a href="https://www.aaryansuwal.com.np">aaryan suwal</a>
        </p>
      </div>
    </footer>
    <script src="/script.js"></script>
  </body>
</html>
