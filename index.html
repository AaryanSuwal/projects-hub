<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aaryan's Project Hub</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <nav>
      <div class="container inner">
        <div class="logo">~/aaryan<span>/projects</span></div>
        <ul class="nav-links">
          <li>
            <a href="https://www.aaryansuwal.com.np" target="_blank"
              >portfolio</a
            >
          </li>
          <li>
            <a href="https://github.com/AaryanSuwal" target="_blank">github</a>
          </li>
        </ul>
      </div>
    </nav>
    <div class="container">
      <section class="hero">
        <div class="hero-label">project hub</div>
        <h1>
          Things I<br /><span class="dim">actually</span>
          <span class="accent">built.</span>
        </h1>
        <p>
          // A curated collection of tools, apps & experiments. Click any card
          to launch.
        </p>
      </section>
      <div class="filters-row">
        <div class="search-wrap">
          <span class="search-icon"><i data-lucide="search"></i></span>
          <input type="text" id="search" placeholder="search projects..." />
        </div>
        <div class="filter-dropdown-container">
          <button class="filter-btn" id="filter-toggle-btn">
            <i data-lucide="filter" class="filter-btn-icon"></i>
            <span>Filter</span>
            <span id="active-filter-indicator"></span>
            <i data-lucide="chevron-down" class="filter-btn-chevron"></i>
          </button>
          <div class="filter-dropdown-menu" id="filter-dropdown-menu">
            <div class="filter-sections-wrapper">
              <div class="filter-section">
                <div class="filter-section-title">Filter by Status</div>
                <div class="filter-options" id="status-filters">
                  <button class="filter-opt-btn" data-type="status" data-val="live">live</button>
                  <button class="filter-opt-btn" data-type="status" data-val="wip">wip</button>
                </div>
              </div>
              <div class="filter-section">
                <div class="filter-section-title">Filter by Technology</div>
                <div class="filter-options" id="tech-filters">
                  <button class="filter-opt-btn" data-type="tech" data-val="HTML">HTML</button>
                  <button class="filter-opt-btn" data-type="tech" data-val="CSS">CSS</button>
                  <button class="filter-opt-btn" data-type="tech" data-val="JS">JS</button>
                  <button class="filter-opt-btn" data-type="tech" data-val="React">React</button>
                  <button class="filter-opt-btn" data-type="tech" data-val="TypeScript">TypeScript</button>
                  <button class="filter-opt-btn" data-type="tech" data-val="Python">Python</button>
                  <button class="filter-opt-btn" data-type="tech" data-val="C">C</button>
                  <button class="filter-opt-btn" data-type="tech" data-val="C++">C++</button>
                  <button class="filter-opt-btn" data-type="tech" data-val="Node.js">Node.js</button>
                  <button class="filter-opt-btn" data-type="tech" data-val="TailwindCSS">TailwindCSS</button>
                  <button class="filter-opt-btn" data-type="tech" data-val="Next.js">Next.js</button>
                  <button class="filter-opt-btn" data-type="tech" data-val="Docker">Docker</button>
                  <button class="filter-opt-btn" data-type="tech" data-val="UI/UX">UI/UX</button>
                  <button class="filter-opt-btn" data-type="tech" data-val="Tool">Tool</button>
                </div>
              </div>
            </div>
            <div class="filter-actions">
              <button class="clear-filters-btn" id="clear-filters-btn">Clear All</button>
            </div>
          </div>
        </div>
      </div>
      <section class="projects-section">
        <div class="section-header">
          <span class="section-title">// projects</span>
          <span id="project-count"></span>
        </div>
        <div class="grid" id="grid">
          <div class="state-msg" id="loading">
            <div class="loader"></div>
            <p>// fetching projects...</p>
          </div>
        </div>
      </section>
    </div>
    <footer>
      <div class="container">
        <p>
          built by <a href="https://www.aaryansuwal.com.np">aaryan suwal</a>
        </p>
      </div>
    </footer>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/script.js"></script>
  </body>
</html>
